<!DOCTYPE html>
<html>
<head>

<title>Crowd Monitoring System</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>

<!-- Chart.js -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.topbar{
background:#1f2937;
color:white;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
}

.tabs{
display:flex;
gap:10px;
}

.tab{
background:#374151;
color:white;
padding:8px 15px;
border-radius:5px;
cursor:pointer;
}

.tab.active{
background:#2563eb;
}

.content{
padding:25px;
}

.totalBox{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
margin-bottom:20px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.totalBox h1{
margin:0;
color:#2563eb;
font-size:42px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

.card{
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.safeCard{
background:#dcfce7;
border:2px solid #22c55e;
}

.dangerCard{
background:#fee2e2;
border:2px solid #ef4444;
}

.safe{color:green}
.danger{color:red}

#map{
height:600px;
display:none;
}

.squareLabel{
font-weight:bold;
color:#111;
background:white;
border-radius:4px;
padding:2px 4px;
}

</style>

</head>

<body>

<div class="topbar">

<h2>📊 Crowd Monitoring System</h2>

<div class="tabs">

<div class="tab active" onclick="showTab('dashboard',this)">Dashboard</div>
<div class="tab" onclick="showTab('map',this)">Map</div>
<div class="tab" onclick="showTab('analytics',this)">Analytics</div>

<a href="/logout">
<div class="tab" style="background:#ef4444;">Logout</div>
</a>

</div>

</div>


<div class="content">

<!-- DASHBOARD -->
<div id="dashboardTab">

<div class="totalBox">
<h3>Total Devices in Event Area</h3>
<h1 id="totalCount">0</h1>
</div>

<div id="gridContainer" class="grid"></div>

</div>


<!-- MAP -->
<div id="map"></div>


<!-- ANALYTICS -->
<div id="analyticsTab" style="display:none">

<h3>Crowd Distribution by Square</h3>

<canvas id="crowdChart" height="120"></canvas>

</div>

</div>


<script>

/* TAB SWITCHING */

function showTab(tab,element){

document.getElementById("dashboardTab").style.display="none";
document.getElementById("map").style.display="none";
document.getElementById("analyticsTab").style.display="none";

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

if(element) element.classList.add("active");

if(tab==="dashboard"){
document.getElementById("dashboardTab").style.display="block";
}

if(tab==="map"){
document.getElementById("map").style.display="block";
map.invalidateSize();
}

if(tab==="analytics"){
document.getElementById("analyticsTab").style.display="block";
}

}


/* MAP */

var map=L.map('map').setView([9.931,76.267],18);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);


/* DRAW EVENT AREA */

var drawnItems=new L.FeatureGroup();
map.addLayer(drawnItems);

var drawControl=new L.Control.Draw({

draw:{
polygon:true,
rectangle:false,
circle:false,
marker:false,
polyline:false,
circlemarker:false
},

edit:{
featureGroup:drawnItems
}

});

map.addControl(drawControl);


/* SAVE EVENT AREA */

map.on(L.Draw.Event.CREATED,function(event){

var layer=event.layer;

drawnItems.clearLayers();
drawnItems.addLayer(layer);

var coordinates=layer.getLatLngs()[0];

var formattedCoords=coordinates.map(function(coord){
return [coord.lng,coord.lat];
});

fetch('/save_boundary',{

method:'POST',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify({
coordinates:formattedCoords
})

})

.then(response=>response.json())

.then(data=>{

if(data.status==="success"){

alert("Event boundary saved successfully!");
map.fitBounds(layer.getBounds());

}else{

alert("Error saving boundary");

}

});

});


/* LIVE USERS */

var userMarkers={};

function updateUsers(){

fetch('/live_users')

.then(res=>res.json())

.then(data=>{

for(let id in userMarkers){

if(!(id in data)){
map.removeLayer(userMarkers[id]);
delete userMarkers[id];
}

}

for(let id in data){

let lat=data[id].lat;
let lon=data[id].lon;

if(userMarkers[id]){

userMarkers[id].setLatLng([lat,lon]);

}else{

let marker=L.circleMarker([lat,lon],{

radius:7,
color:"red",
fillColor:"red",
fillOpacity:0.9

}).addTo(map);

userMarkers[id]=marker;

}

}

});

}

setInterval(updateUsers,3000);


/* DRAW GRID SQUARES ON MAP */

let squareLayers=[];

function drawSquares(){

fetch('/dashboard_data')

.then(res=>res.json())

.then(data=>{

squareLayers.forEach(layer=>map.removeLayer(layer));
squareLayers=[];

for(const id in data){

let sq=data[id];

let bounds=[
[sq.lat_min,sq.lon_min],
[sq.lat_max,sq.lon_max]
];

let rect=L.rectangle(bounds,{
color:"#2563eb",
weight:1,
fillOpacity:0.05
}).addTo(map);

rect.bindTooltip(id,{
permanent:true,
direction:"center",
className:"squareLabel"
});

squareLayers.push(rect);

}

});

}

setInterval(drawSquares,4000);


/* DASHBOARD GRID */

function updateDashboard(){

fetch('/dashboard_data')

.then(res=>res.json())

.then(data=>{

const grid=document.getElementById("gridContainer");
const total=document.getElementById("totalCount");

grid.innerHTML="";

let totalPeople=0;

for(const id in data){

let square=data[id];

totalPeople+=square.count;

let isOvercrowded=square.count>square.limit;

let status=isOvercrowded
? '<p class="danger">⚠ OVERCROWDED</p>'
: '<p class="safe">Safe</p>';

let card=`
<div class="card ${isOvercrowded ? "dangerCard" : "safeCard"}">
<h3>Square ${id}</h3>
<p>People: ${square.count}</p>
<p>Limit: ${square.limit}</p>
${status}
</div>
`;

grid.innerHTML+=card;

}

total.innerText=totalPeople;

});

}

setInterval(updateDashboard,2000);
updateDashboard();


/* ANALYTICS CHART */

let crowdChart;

function updateAnalytics(){

fetch('/dashboard_data')

.then(res=>res.json())

.then(data=>{

let labels=[];
let counts=[];

for(const id in data){
labels.push(id);
counts.push(data[id].count);
}

if(!crowdChart){

const ctx=document.getElementById("crowdChart").getContext("2d");

crowdChart=new Chart(ctx,{
type:"bar",
data:{
labels:labels,
datasets:[{
label:"People per Square",
data:counts,
backgroundColor:"#3b82f6"
}]
},
options:{
responsive:true,
plugins:{legend:{display:false}},
scales:{
y:{
beginAtZero:true,
ticks:{stepSize:1}
}
}
}
});

}else{

crowdChart.data.labels=labels;
crowdChart.data.datasets[0].data=counts;
crowdChart.update();

}

});

}

setInterval(updateAnalytics,3000);

</script>

</body>
</html>
