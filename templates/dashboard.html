<!DOCTYPE html>
<html>
<head>

<title>Crowd Monitoring System</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.topbar{
background:#1f2937;
color:white;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
}

.tabs{
display:flex;
gap:10px;
}

.tab{
background:#374151;
color:white;
padding:8px 15px;
border-radius:5px;
cursor:pointer;
}

.content{
padding:25px;
}

.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
text-align:center;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.safe{color:green}
.danger{color:red}

#map{
height:600px;
display:none;
}

</style>

</head>

<body>

<div class="topbar">

<h2>📊 Crowd Monitoring System</h2>

<div class="tabs">

<div class="tab" onclick="showTab('dashboard')">Dashboard</div>
<div class="tab" onclick="showTab('map')">Map</div>
<div class="tab" onclick="showTab('analytics')">Analytics</div>

<a href="/logout">
<div class="tab" style="background:#ef4444;">Logout</div>
</a>

</div>

</div>


<div class="content">

<!-- DASHBOARD TAB -->
<div id="dashboardTab">

<div id="gridContainer" class="grid">

<!-- Squares inserted dynamically -->

</div>

</div>


<!-- MAP TAB -->
<div id="map"></div>


<!-- ANALYTICS TAB -->
<div id="analyticsTab" style="display:none">

<h3>Analytics Coming Soon</h3>

<ul>
<li>Crowd density graphs</li>
<li>Peak crowd analysis</li>
<li>Event timeline reports</li>
</ul>

</div>

</div>


<script>

/* ---------------- TAB SWITCHING ---------------- */

function showTab(tab){

document.getElementById("dashboardTab").style.display="none";
document.getElementById("map").style.display="none";
document.getElementById("analyticsTab").style.display="none";

if(tab==="dashboard"){
document.getElementById("dashboardTab").style.display="block";
}

if(tab==="map"){
document.getElementById("map").style.display="block";
map.invalidateSize();
}

if(tab==="analytics"){
document.getElementById("analyticsTab").style.display="block";
}

}


/* ---------------- MAP SETUP ---------------- */

var map=L.map('map').setView([9.931,76.267],18);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);


/* ---------------- DRAW EVENT BOUNDARY ---------------- */

var drawnItems=new L.FeatureGroup();
map.addLayer(drawnItems);

var drawControl=new L.Control.Draw({

draw:{
polygon:true,
rectangle:false,
circle:false,
marker:false,
polyline:false,
circlemarker:false
},

edit:{
featureGroup:drawnItems
}

});

map.addControl(drawControl);


/* ---------------- SAVE BOUNDARY ---------------- */

map.on(L.Draw.Event.CREATED,function(event){

var layer=event.layer;

drawnItems.clearLayers();
drawnItems.addLayer(layer);

var coordinates=layer.getLatLngs()[0];

var formattedCoords=coordinates.map(function(coord){
return [coord.lng,coord.lat];
});

fetch('/save_boundary',{

method:'POST',

headers:{
'Content-Type':'application/json'
},

body:JSON.stringify({
coordinates:formattedCoords
})

})

.then(response=>response.json())

.then(data=>{

if(data.status==="success"){

alert("Event boundary saved successfully!");

map.fitBounds(layer.getBounds());

}else{

alert("Error saving boundary");

}

});

});


/* ---------------- LIVE USERS ---------------- */

var userMarkers={};

function updateUsers(){

fetch('/live_users')

.then(res=>res.json())

.then(data=>{

// REMOVE USERS WHO LEFT
for(let id in userMarkers){

if(!(id in data)){

map.removeLayer(userMarkers[id]);
delete userMarkers[id];

}

}

// ADD / UPDATE USERS
for(let id in data){

let lat=data[id].lat;
let lon=data[id].lon;

if(userMarkers[id]){

userMarkers[id].setLatLng([lat,lon]);

}else{

let marker=L.circleMarker([lat,lon],{

radius:7,
color:"red",
fillColor:"red",
fillOpacity:0.9

}).addTo(map);

userMarkers[id]=marker;

}

}

});

}

setInterval(updateUsers,3000);


/* ---------------- DASHBOARD GRID ---------------- */

function updateDashboard(){

fetch('/dashboard_data')

.then(res=>res.json())

.then(data=>{

const grid=document.getElementById("gridContainer");

grid.innerHTML="";

if(Object.keys(data).length===0){

grid.innerHTML=`
<div class="card" style="grid-column:span 4;">
<h3>No Event Area Defined</h3>
<p>Draw the event boundary in the Map tab.</p>
</div>
`;

return;
}

for(const id in data){

let square=data[id];

let status=square.count>square.limit
? '<p class="danger">⚠ OVERCROWDED</p>'
: '<p class="safe">Safe</p>';

let card=`
<div class="card">
<h3>Square ${id}</h3>
<p>People: ${square.count}</p>
<p>Limit: ${square.limit}</p>
${status}
</div>
`;

grid.innerHTML+=card;

}

});

}

setInterval(updateDashboard,2000);

updateDashboard();

</script>

</body>
</html>
