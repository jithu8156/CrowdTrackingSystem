<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <meta http-equiv="refresh" content="3">

    <style>
        body{
            font-family: Arial;
            margin:0;
            background:#f4f4f4;
        }

        .topbar{
            background:#111;
            color:white;
            padding:15px;
            display:flex;
            justify-content:space-between;
        }

        .container{
            display:grid;
            grid-template-columns: repeat(4,1fr);
            gap:20px;
            padding:30px;
        }

        .card{
            background:white;
            padding:20px;
            border-radius:10px;
            text-align:center;
            box-shadow:0 3px 8px rgba(0,0,0,0.1);
        }

        .safe{
            color:green;
            font-weight:bold;
        }

        .danger{
            color:red;
            font-weight:bold;
        }

        button{
            padding:8px 15px;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<div class="topbar">
    <div>📊 Crowd Monitoring Dashboard</div>

    <div>
        <a href="/admin/map"><button>Define Event Area</button></a>
        <a href="/logout"><button>Logout</button></a>
    </div>
</div>

<div class="container">

{% for id, square in squares.items() %}

<div class="card">

<h3>Square {{ id }}</h3>

<p>People: {{ square.count }}</p>

<p>Limit: {{ square.limit }}</p>

{% if square.count > square.limit %}
<p class="danger">⚠ OVERCROWDED</p>
{% else %}
<p class="safe">Safe</p>
{% endif %}

</div>

{% endfor %}

</div>

</body>
</html>
