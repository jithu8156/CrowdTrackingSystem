<!DOCTYPE html>
<html>
<head>
<title>Event Monitoring Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
}

.top-bar{
background:#1f2937;
color:white;
padding:15px 25px;
display:flex;
justify-content:space-between;
align-items:center;
}

.top-bar h2{
margin:0;
}

button{
padding:8px 14px;
border:none;
border-radius:6px;
cursor:pointer;
background:#3b82f6;
color:white;
}

#status{
background:#e5e7eb;
padding:10px;
font-size:14px;
}

#map{
height:620px;
}

</style>

</head>

<body>

<div class="top-bar">

<h2>📍 Event Boundary & Live Crowd Map</h2>

<a href="/dashboard">
<button>⬅ Dashboard</button>
</a>

</div>

<div id="status">
Draw the event boundary using the polygon tool.
</div>

<div id="map"></div>

<script>

// ---------------- MAP SETUP ----------------

var map = L.map('map').setView([9.931,76.267],18);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);


// ---------------- DRAW EVENT BOUNDARY ----------------

var drawnItems = new L.FeatureGroup();
map.addLayer(drawnItems);

var drawControl = new L.Control.Draw({

draw:{
polygon:true,
rectangle:false,
circle:false,
marker:false,
polyline:false,
circlemarker:false
},

edit:{
featureGroup:drawnItems
}

});

map.addControl(drawControl);


// ---------------- SAVE BOUNDARY ----------------

map.on(L.Draw.Event.CREATED,function(event){

var layer = event.layer;

drawnItems.clearLayers();
drawnItems.addLayer(layer);

var coordinates = layer.getLatLngs()[0];

var formattedCoords = coordinates.map(function(coord){
return [coord.lng,coord.lat];
});

document.getElementById("status").innerText="Saving boundary...";

fetch('/save_boundary',{
method:'POST',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify({
coordinates:formattedCoords
})
})

.then(response=>response.json())

.then(data=>{

if(data.status==="success"){

document.getElementById("status").innerText=
"✅ Event boundary saved successfully";

map.fitBounds(layer.getBounds());

}else{

document.getElementById("status").innerText=
"❌ Error saving boundary";

}

})

.catch(()=>{
document.getElementById("status").innerText=
"❌ Server connection error";
});

});


// ---------------- LIVE USER TRACKING ----------------

var userMarkers={};

function updateUsers(){

fetch('/live_users')

.then(response=>response.json())

.then(data=>{

for(let id in data){

let lat=data[id].lat;
let lon=data[id].lon;

if(userMarkers[id]){

userMarkers[id].setLatLng([lat,lon]);

}else{

let marker=L.circleMarker([lat,lon],{

radius:7,
color:"#ef4444",
fillColor:"#ef4444",
fillOpacity:0.9

}).addTo(map);

marker.bindPopup("📍 Event User");

userMarkers[id]=marker;

}

}

});

}

// update every 3 seconds
setInterval(updateUsers,3000);

</script>

</body>
</html>
