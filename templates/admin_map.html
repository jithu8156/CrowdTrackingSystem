<!DOCTYPE html>
<html>
<head>
    <title>Define Event Area</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <!-- Leaflet Draw CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css"/>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <!-- Leaflet Draw JS -->
    <script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>

    <style>
        body { margin: 0; font-family: Arial; }

        .top-bar {
            background: #111;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #map {
            height: 600px;
        }

        button {
            padding: 8px 12px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="top-bar">
    <div>📍 Draw Event Boundary</div>
    <div>
        <a href="/dashboard">
            <button>⬅ Back to Dashboard</button>
        </a>
    </div>
</div>

<div id="map"></div>

<script>

    // Initialize map
    var map = L.map('map').setView([9.931, 76.267], 18);

    // Map tiles
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // Layer to store drawn shapes
    var drawnItems = new L.FeatureGroup();
    map.addLayer(drawnItems);

    // Drawing controls
    var drawControl = new L.Control.Draw({
        draw: {
            polygon: true,
            rectangle: false,
            circle: false,
            marker: false,
            polyline: false,
            circlemarker: false
        },
        edit: {
            featureGroup: drawnItems
        }
    });

    map.addControl(drawControl);

    // When polygon is created
    map.on(L.Draw.Event.CREATED, function (event) {

        var layer = event.layer;

        // allow only one boundary
        drawnItems.clearLayers();
        drawnItems.addLayer(layer);

        // Extract coordinates
        var coordinates = layer.getLatLngs()[0];

        var formattedCoords = coordinates.map(function(coord) {
            return [coord.lng, coord.lat];
        });

        console.log("Boundary:", formattedCoords);

        // Send to backend
        fetch('/save_boundary', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                coordinates: formattedCoords
            })
        })
        .then(response => response.json())
        .then(data => {

            if(data.status === "success"){
                alert("Event boundary saved successfully!");
            }
            else{
                alert("Error saving boundary: " + data.message);
            }

        })
        .catch(error => {
            console.error("Error:", error);
            alert("Failed to save boundary.");
        });

    });

</script>

</body>
</html>
